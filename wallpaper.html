<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:transparent;overflow:hidden;font-family:"Consolas","Courier New","Microsoft YaHei","SimHei",monospace;font-size:22px}
body{display:flex;align-items:center;justify-content:center}
.w{background:#0c0c0c;border:1px solid #555;width:1100px;min-width:1100px;max-width:1100px;padding:20px 28px 18px 28px;color:#c0c0c0;overflow:hidden}
.tb{color:#c0c0c0;font-size:19px;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid #444;white-space:nowrap}
.tb .l{color:#0f0}.tb .s{color:#666}
.sys{line-height:1.7;margin-bottom:8px}
.sys .k{color:#0f0}.sys .v{color:#f0f0f0}.sys .m{color:#999;font-size:19px}
.sys .sep{color:#555;margin:4px 0;font-size:19px}
.np-block{display:flex;gap:22px;margin:8px 0}
.np-left{flex-shrink:0;width:200px}
.art-box{width:200px;height:200px;border:1px solid #555;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center}
.art-box img{width:100%;height:100%;object-fit:cover}
.art-ph{color:#444;font-size:15px;text-align:center;line-height:1.5}
.np-right{flex:1;min-width:0}
.np-prog{line-height:1.5;margin-bottom:4px}
.np-prog .time{color:#999;font-size:19px}
.np-title{color:#fff;font-size:22px;line-height:1.5}
.np-artist{color:#00ccff;font-size:20px}
.np-album{color:#999;font-size:18px}
.eq-block{display:flex;gap:10px;line-height:1.5;margin-top:6px}
.eq-labels{flex-shrink:0;display:flex;flex-direction:column;gap:2px;font-size:19px}
.eq-labels .l1{color:#ff5555}.eq-labels .l2{color:#f1fa8c}.eq-labels .l3{color:#50fa7b}
.eq-bars{display:flex;flex-direction:column;gap:2px;width:420px;min-width:420px;max-width:420px;flex:none}
.eq-row{display:flex;align-items:center;font-size:18px;white-space:nowrap;width:420px;overflow:hidden}
.eq-b{color:#ff5555}.eq-m{color:#f1fa8c}.eq-t{color:#50fa7b}.eq-s{color:#222}.eq-p{color:#666;margin-left:10px;font-size:15px;min-width:42px;display:inline-block}
#u{color:#555;font-size:15px;text-align:right;margin-top:10px;padding-top:6px;border-top:1px solid #444;white-space:nowrap;overflow:hidden;text-overflow:clip;width:100%}
</style></head><body>
<div class="w">
<div class="tb">
<span class="l" id="uprompt">C:\Users\user&gt;</span> <span id="td">00:00:00</span><span class="s">|</span><span id="tp">60.5%</span><span class="s">|</span><span id="dt">----</span>
</div>
<div class="sys" id="sys"></div>
<div class="np-block">
<div class="np-left">
<div class="art-box"><img id="art" style="display:none"><div class="art-ph" id="artph"><span style="font-size:40px;color:#444">&#9835;</span><br>no album<br>art</div></div>
</div>
<div class="np-right">
<div class="np-prog" id="npprog"><span class="time">--:--</span> no media</div>
<div class="np-title" id="nptitle"></div>
<div class="np-artist" id="npartist"></div>
<div class="np-album" id="npalbum"></div>
<div class="eq-block">
<div class="eq-labels"><span class="l1">BASS</span><span class="l2">MID</span><span class="l3">TREB</span></div>
<div class="eq-bars">
<div class="eq-row" id="eqb"></div>
<div class="eq-row" id="eqm"></div>
<div class="eq-row" id="eqt"></div>
</div>
</div>
</div>
</div>
<div id="u"></div>
</div>
<script>
(function(){
var S={
  npTitle:null,npStart:0,npDur:0,sm:{b:0,m:0,t:0},
  _artLoaded:false,_artRetries:0,_lastNpState:null
};

// ── WE native media state ─────────────────────────────────
var mediaState = {
  nativeAvailable: false,
  enabled: false,
  hasNativeMedia: false,
  hasNativeArt: false,
  title: '',
  artist: '',
  album: '',
  albumArtist: '',
  thumbnail: '',
  playbackState: 'stopped',
  position: 0,
  duration: 0,
  lastTimelineUpdate: 0,
  lastThumbAt: 0,
  source: 'none'
};

// ── Clock (1s JS local) ──────────────────────────────────
(function tck(){
  var n=new Date(),h=n.getHours(),m=n.getMinutes(),se=n.getSeconds();
  document.getElementById('td').textContent=String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')+':'+String(se).padStart(2,'0');
  document.getElementById('dt').textContent=n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0')+'-'+String(n.getDate()).padStart(2,'0')+' '+['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][n.getDay()];
  var pct=(h*3600+m*60+se)/86400*100;
  document.getElementById('tp').textContent=pct.toFixed(1)+'%';
  setTimeout(tck,1000);
})();

// ── Helpers ──────────────────────────────────────────────
function pg(p,w){w=w||30;var f=Math.round(p/100*w);if(f<0)f=0;if(f>w)f=w;
  var c=p>=80?'#ff5555':p>=50?'#f1fa8c':'#50fa7b';
  var e=w-f;
  return'<span style="color:'+c+'">'+'█'.repeat(f)+'</span><span style="color:#333">'+'█'.repeat(e)+'</span>';
}
function e(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function fm(g){return g>=1000?(g/1024).toFixed(1)+' TB':g.toFixed(1)+' GiB'}
function ft(s){s=isNaN(s)?0:Math.max(0,Math.round(s));return Math.floor(s/60)+':'+String(s%60).padStart(2,'0')}

// ── setAlbumArt helper ───────────────────────────────────
function setAlbumArt(src, source) {
  var art = document.getElementById('art');
  var ph = document.getElementById('artph');
  if (!art || !ph || !src) return;

  art.onload = function () {
    art.style.display = 'block';
    ph.style.display = 'none';
    if(source==='native') mediaState.hasNativeArt = true;
    S._artLoaded = true;
  };

  art.onerror = function () {
    if (source === 'native') {
      mediaState.hasNativeArt = false;
      art.style.display = 'none';
      ph.style.display = '';
    }
  };

  art.src = src;
}

// ── WE Native Media Listeners ────────────────────────────
// Thumbnail: set directly (base64 PNG)
function wallpaperMediaThumbnailListener(event) {
  if (!event || !event.thumbnail) {
    mediaState.hasNativeArt = false;
    return;
  }
  mediaState.hasNativeMedia = true;
  mediaState.thumbnail = event.thumbnail;
  mediaState.lastThumbAt = Date.now();
  setAlbumArt(event.thumbnail, 'native');
}
if (typeof window.wallpaperRegisterMediaThumbnailListener === 'function') {
  window.wallpaperRegisterMediaThumbnailListener(wallpaperMediaThumbnailListener);
}

// Properties: title, artist, album
function wallpaperMediaPropertiesListener(event) {
  if (!event) return;
  mediaState.hasNativeMedia = true;
  mediaState.title = event.title || '';
  mediaState.artist = event.artist || '';
  mediaState.album = event.albumTitle || '';
  if (mediaState.title) document.getElementById('nptitle').textContent = mediaState.title;
  if (mediaState.artist) document.getElementById('npartist').textContent = mediaState.artist;
  document.getElementById('npalbum').textContent = mediaState.album ? '[' + mediaState.album + ']' : '';
}
if (typeof window.wallpaperRegisterMediaPropertiesListener === 'function') {
  window.wallpaperRegisterMediaPropertiesListener(wallpaperMediaPropertiesListener);
}

// Playback state
function wallpaperMediaPlaybackListener(event) {
  if (!event || !window.wallpaperMediaIntegration) return;
  mediaState.hasNativeMedia = true;
  if (event.state === window.wallpaperMediaIntegration.PLAYBACK_PLAYING) {
    mediaState.playbackState = 'playing';
  } else if (event.state === window.wallpaperMediaIntegration.PLAYBACK_PAUSED) {
    mediaState.playbackState = 'paused';
  } else {
    mediaState.playbackState = 'stopped';
  }
}
if (typeof window.wallpaperRegisterMediaPlaybackListener === 'function') {
  window.wallpaperRegisterMediaPlaybackListener(wallpaperMediaPlaybackListener);
}

// Timeline: position, duration
function wallpaperMediaTimelineListener(event) {
  if (!event) return;
  mediaState.hasNativeMedia = true;
  mediaState.position = Number(event.position) || 0;
  mediaState.duration = Number(event.duration) || 0;
  mediaState.lastTimelineUpdate = Date.now();
}
if (typeof window.wallpaperRegisterMediaTimelineListener === 'function') {
  window.wallpaperRegisterMediaTimelineListener(wallpaperMediaTimelineListener);
}

// ── EQ: Wallpaper Engine native audio listener ───────────
var EQ = {
  registered: false,
  hasWallpaperAudio: false,
  frames: 0,
  lastLen: 0,
  lastFrameAt: 0,
  lastNonZeroAt: 0,
  lastError: '',
  source: 'none',
  lastSum: 0,
  lastMax: 0,
  lastAvg: 0
};

function wallpaperAudioListener(audioArray) {
  try {
    if (!audioArray || audioArray.length < 128) {
      EQ.lastError = 'invalid audioArray length';
      return;
    }

    var bass = 0, mid = 0, treble = 0;
    var bc = 0, mc = 0, tc = 0;
    var bassPeak = 0, midPeak = 0, treblePeak = 0;
    var sumAll = 0, maxAll = 0;

    // Full-array diagnostics first.
    for (var j = 0; j < audioArray.length; j++) {
      var raw = Math.min(Number(audioArray[j]) || 0, 1);
      sumAll += raw;
      if (raw > maxAll) maxAll = raw;
    }
    EQ.lastSum = sumAll;
    EQ.lastMax = maxAll;
    EQ.lastAvg = sumAll / audioArray.length;

    // Wallpaper Engine audioArray:
    // 0-63 = left channel, 64-127 = right channel.
    // Merge L/R first, then split 0-63 into bands.
    for (var i = 0; i < 64; i++) {
      var left = Math.min(Number(audioArray[i]) || 0, 1);
      var right = Math.min(Number(audioArray[i + 64]) || 0, 1);
      var v = (left + right) / 2;

      if (i < 8) {
        bass += v; bc++;
        if (v > bassPeak) bassPeak = v;
      } else if (i < 32) {
        mid += v; mc++;
        if (v > midPeak) midPeak = v;
      } else {
        treble += v; tc++;
        if (v > treblePeak) treblePeak = v;
      }
    }

    var avgB = bass / Math.max(1, bc);
    var avgM = mid / Math.max(1, mc);
    var avgT = treble / Math.max(1, tc);

    // Use avg + peak and nonlinear compression. WE Web audio values are often tiny
    // (max around 0.02-0.08), so linear gain still looks static in a terminal bar.
    function bandToPercent(avg, peak, gain, floor) {
      var energy = avg * 0.65 + peak * 0.35;
      var amplified = Math.min(1, energy * gain);
      var pct = Math.pow(amplified, 0.62) * 100;
      if (sumAll > 0.02) pct = Math.max(pct, floor);
      if (pct < 0.5) pct = 0;
      return Math.max(0, Math.min(100, pct));
    }

    var nextB = bandToPercent(avgB, bassPeak, 38, 8);
    var nextM = bandToPercent(avgM, midPeak, 52, 6);
    var nextT = bandToPercent(avgT, treblePeak, 78, 4);

    // Silence / pause decay. If audio frames still arrive with near-zero values,
    // decay gently instead of freezing the last visible bars.
    if (sumAll <= 0.001 || maxAll <= 0.0005) {
      S.eqB *= 0.84; if (S.eqB < 0.5) S.eqB = 0;
      S.eqM *= 0.84; if (S.eqM < 0.5) S.eqM = 0;
      S.eqT *= 0.84; if (S.eqT < 0.5) S.eqT = 0;
    } else {
      // Fast enough to be visible, but still smoothed for wallpaper use.
      S.eqB = (S.eqB || 0) * 0.45 + nextB * 0.55;
      S.eqM = (S.eqM || 0) * 0.42 + nextM * 0.58;
      S.eqT = (S.eqT || 0) * 0.38 + nextT * 0.62;
    }

    EQ.hasWallpaperAudio = true;
    EQ.frames++;
    EQ.lastLen = audioArray.length;
    EQ.lastFrameAt = Date.now();
    EQ.source = 'WE-AUDIO';
    if (sumAll > 0.001) EQ.lastNonZeroAt = Date.now();
  } catch (err) {
    EQ.lastError = String(err && err.message ? err.message : err);
  }
}

try {
  if (typeof window.wallpaperRegisterAudioListener === 'function') {
    window.wallpaperRegisterAudioListener(wallpaperAudioListener);
    EQ.registered = true;
  } else {
    EQ.lastError = 'wallpaperRegisterAudioListener unavailable';
  }
} catch (err) {
  EQ.lastError = String(err && err.message ? err.message : err);
}

// ── JSON fallback: only when no WE audio ──
setInterval(function () {
  if (EQ.hasWallpaperAudio && Date.now() - EQ.lastFrameAt < 3000) return;
  var x = new XMLHttpRequest();
  x.open('GET', 'data/eq_data.json?cb=' + Date.now(), true);
  x.timeout = 300;
  x.onload = function () {
    try {
      var d = JSON.parse(x.responseText || '{}');
      S.eqB = Number(d.b) || 0;
      S.eqM = Number(d.m) || 0;
      S.eqT = Number(d.t) || 0;
      EQ.source = 'JSON-FALLBACK';
    } catch (e) { EQ.lastError = 'fallback parse failed'; }
  };
  x.onerror = function () { EQ.lastError = 'fallback request failed'; };
  x.ontimeout = function () { EQ.lastError = 'fallback timeout'; };
  x.send();
}, 500);

// ── EQ animation (every 100ms) ───────────────────────────
(function eqAnm(){
  var w=32;
  var sm=S.sm,b=S.eqB||0,m=S.eqM||0,t=S.eqT||0;
  sm.b+=(b-sm.b)*0.65;sm.m+=(m-sm.m)*0.65;sm.t+=(t-sm.t)*0.65;
  var bf=Math.max(0,Math.min(w,Math.round(sm.b/100*w)));
  var mf=Math.max(0,Math.min(w,Math.round(sm.m/100*w)));
  var tf=Math.max(0,Math.min(w,Math.round(sm.t/100*w)));
  document.getElementById('eqb').innerHTML='<span class="eq-b">'+'█'.repeat(bf)+'</span><span class="eq-s">'+'█'.repeat(w-bf)+'</span><span class="eq-p">'+Math.round(sm.b)+'%</span>';
  document.getElementById('eqm').innerHTML='<span class="eq-m">'+'█'.repeat(mf)+'</span><span class="eq-s">'+'█'.repeat(w-mf)+'</span><span class="eq-p">'+Math.round(sm.m)+'%</span>';
  document.getElementById('eqt').innerHTML='<span class="eq-t">'+'█'.repeat(tf)+'</span><span class="eq-s">'+'█'.repeat(w-tf)+'</span><span class="eq-p">'+Math.round(sm.t)+'%</span>';
  setTimeout(eqAnm,80);
})();

// ── System info (from data/system_info.json, every 5s) ───
(function loadSys(){
  var x=new XMLHttpRequest();
  x.open('GET','data/system_info.json',true);x.overrideMimeType('application/json; charset=utf-8');x.timeout=5000;
  x.onload=function(){
    if(x.status!==200&&x.status!==0)return;
    try{var t=x.responseText;if(t.charCodeAt(0)===0xFEFF)t=t.slice(1);var d=JSON.parse(t);
      var s=d.system,o=d.os,c=d.cpu,g=d.gpu,m=d.memory,dk=d.disk,nw=d.network,mb=d.motherboard;
      var lines=[];

      if(s){
        var uname=s.username||'user';
        document.getElementById('uprompt').textContent='C:\\Users\\'+uname+'>';
        lines.push('<span class="k">user  </span><span class="v">'+e(uname)+'</span><span class="m"> @ </span><span class="v">'+e(s.hostname||'?')+'</span>');
      }
      lines.push('<div class="sep">'+'─'.repeat(48)+'</div>');
      if(o)lines.push('<span class="k">os   </span><span class="v">'+e(o.name||'?')+'</span> <span class="m">'+e(o.version||'')+' ('+e(o.architecture||'')+')</span>');
      if(c)lines.push('<span class="k">cpu  </span><span class="v">'+e(c.name||'?')+'</span> <span class="m">'+(c.cores||0)+'C/'+(c.threads||0)+'T @ '+(c.frequency_mhz||0)+'MHz</span>');
      if(g){var gn='';if(typeof g==='string')gn=g;else if(Array.isArray(g)){gn=g.filter(function(x){return x.indexOf('OrayIdd')<0})[0]||g[0]||''} if(gn)lines.push('<span class="k">gpu  </span><span class="v">'+e(gn)+'</span>')}
      if(m)lines.push('<span class="k">ram  </span><span class="v">'+fm(m.used_gb||0)+'</span><span class="m"> / '+fm(m.total_gb||0)+' ('+(m.percent||0).toFixed(0)+'%)</span> '+pg(m.percent||0,28));
      lines.push('<div class="sep">'+'─'.repeat(48)+'</div>');
      if(dk)Object.keys(dk).forEach(function(l){var dd=dk[l];lines.push('<span class="k">disk </span><span class="v">'+e(l.replace(':',''))+'</span> <span class="m"> '+fm(dd.used_gb||0)+' / '+fm(dd.total_gb||0)+' ('+(dd.percent||0).toFixed(0)+'%)</span> '+pg(dd.percent||0,28))});
      if(nw&&nw.ipv4)lines.push('<span class="k">net  </span><span class="v">'+e(nw.ipv4)+'</span>'+(nw['interface']?'<span class="m"> ('+e(nw['interface'])+')</span>':''));
      if(mb)lines.push('<span class="k">mb   </span><span class="m">'+e(mb)+'</span>');

      var html='<div>'+lines.join('</div><div>')+'</div>';
      if(S._lastSys!==html){S._lastSys=html;document.getElementById('sys').innerHTML=html}
    }catch(e){}
  };
  x.onerror=function(){
    document.getElementById('sys').innerHTML='<span style="color:#888">System helper not installed</span><br><span style="color:#555;font-size:16px">Run install.ps1 to enable system stats</span>';
  };
  x.send();
  setTimeout(loadSys,5000);
})();

// ── Now playing display update (every 500ms) ─────────────
setInterval(function(){
  var hasMedia = mediaState.hasNativeMedia && mediaState.title;
  var pos, dur;

  if (hasMedia) {
    // Local position interpolation
    if (mediaState.playbackState === 'playing' && mediaState.duration > 0) {
      pos = Math.min(mediaState.position + (Date.now() - mediaState.lastTimelineUpdate) / 1000, mediaState.duration);
    } else {
      pos = mediaState.position;
    }
    dur = mediaState.duration;

    var pct = dur > 0 ? Math.min(99.9, pos / dur * 100) : 0;
    var prog = '<span class="time" id="postime">' + ft(pos) + '</span> ' + pg(pct, 30) + ' <span class="time">/ ' + ft(dur) + '</span>';
    if (S._lastNpProg !== prog) { S._lastNpProg = prog; document.getElementById('npprog').innerHTML = prog; }
    S.npTitle = mediaState.title; // Keep for position ticker
    S.npStart = Date.now() - pos * 1000;
    S.npDur = dur;
    S._lastNpState = 'playing';

    // Local file fallback — only if native art not available
    if (!mediaState.hasNativeArt && !S._artLoaded && S._artRetries > 0 && pos >= 1) {
      S._artRetries--;
      var ts = encodeURIComponent(mediaState.title || Date.now());
      var art = document.getElementById('art');
      art.onload = function () {
        this.style.display = 'block';
        document.getElementById('artph').style.display = 'none';
        S._artLoaded = true;
      };
      art.onerror = function () {
        if (this.src.indexOf('album_art.png') !== -1) {
          this.src = 'data/album_art.jpg?cb=' + ts;
        } else {
          this.style.display = 'none';
          document.getElementById('artph').style.display = '';
        }
      };
      art.src = 'data/album_art.png?cb=' + ts;
    }
  } else {
    // Reset when no media — but preserve native art
    S.npTitle = null;
    if (!mediaState.hasNativeArt) {
      document.getElementById('art').style.display = 'none';
      document.getElementById('artph').style.display = '';
    }
    if (S._lastNpState !== 'none') {
      S._lastNpState = 'none';
      document.getElementById('npprog').innerHTML = '<span class="time">--:--</span> no media';
      document.getElementById('nptitle').textContent = '';
      document.getElementById('npartist').textContent = '';
      document.getElementById('npalbum').textContent = '';
      S._artLoaded = false;
      S._artRetries = 0;
    }
  }
}, 500);

// ── Position ticker (500ms, JS interpolation) ────────────
setInterval(function(){
  if (!S.npTitle) return;
  var p = document.getElementById('postime');
  if (p) p.textContent = ft((Date.now() - S.npStart) / 1000);
}, 500);

// ── smtc_data.json fallback poller ───────────────────────
(function loadSmtc(){
  if (mediaState.hasNativeMedia) { setTimeout(loadSmtc, 2000); return; }
  var x = new XMLHttpRequest();
  x.open('GET', 'data/smtc_data.json', true);
  x.overrideMimeType('application/json; charset=utf-8');
  x.timeout = 2000;
  x.onload = function () {
    if (x.status !== 200 && x.status !== 0) return;
    try {
      var t = x.responseText;
      if (t.charCodeAt(0) === 0xFEFF) t = t.slice(1);
      var d = JSON.parse(t);
      if (d.status === 'playing' && d.title && d.artist) {
        var sp = d.pos || 0, sd = d.dur || 0;
        S.npTitle = d.title;
        S.npStart = Date.now() - sp * 1000;
        S.npDur = sd || 0;
        S._lastNpState = 'playing';
        document.getElementById('nptitle').textContent = d.title;
        document.getElementById('npartist').textContent = d.artist;
        document.getElementById('npalbum').textContent = d.album ? '[' + d.album + ']' : '';

        // smtc art fallback — only if no native art
        if (!mediaState.hasNativeArt && d.has_art && sp >= 1) {
          S._artRetries = 3;
          var art = document.getElementById('art');
          var ts = encodeURIComponent(d.title || Date.now());
          art.onload = function () {
            this.style.display = 'block';
            document.getElementById('artph').style.display = 'none';
            S._artLoaded = true;
          };
          art.onerror = function () {
            if (this.src.indexOf('album_art.png') !== -1) {
              this.src = 'data/album_art.jpg?cb=' + ts;
            }
          };
          art.src = 'data/album_art.png?cb=' + ts;
        }
      } else {
        S.npTitle = null;
        if (!mediaState.hasNativeArt) {
          document.getElementById('art').style.display = 'none';
          document.getElementById('artph').style.display = '';
        }
      }
    } catch (e) {}
  };
  x.send();
  setTimeout(loadSmtc, 2000);
})();

// ── Update time footer (every 1s) ────────────────────────
setInterval(function(){
  var n = new Date();
  var ts = n.getFullYear() + '-' + String(n.getMonth() + 1).padStart(2, '0') + '-' + String(n.getDate()).padStart(2, '0') + ' ' + String(n.getHours()).padStart(2, '0') + ':' + String(n.getMinutes()).padStart(2, '0') + ':' + String(n.getSeconds()).padStart(2, '0');

  var artState;
  if (mediaState.hasNativeArt) artState = 'ART:NATIVE';
  else if (S._artLoaded) artState = 'ART:FALLBACK';
  else artState = 'ART:NONE';

  var mediaSrc = mediaState.hasNativeMedia ? 'MEDIA:NATIVE' : 'MEDIA:JSON';

  var eqState;
  if (!EQ.registered) {
    eqState = 'EQ:NOT-REGISTERED';
  } else if (EQ.frames === 0) {
    eqState = 'EQ:REGISTERED-NO-FRAMES';
  } else if (EQ.hasWallpaperAudio && Date.now() - EQ.lastFrameAt < 3000) {
    var nz = EQ.lastNonZeroAt ? ((Date.now()-EQ.lastNonZeroAt)/1000).toFixed(1)+'s' : '?';
    eqState = 'EQ:WE-AUDIO frames=' + EQ.frames + ' len=' + EQ.lastLen + ' max=' + EQ.lastMax.toFixed(3) + ' sum=' + EQ.lastSum.toFixed(3) + ' b/m/t=' + Math.round(S.eqB||0) + '/' + Math.round(S.eqM||0) + '/' + Math.round(S.eqT||0) + ' nz=' + nz;
  } else if (EQ.source === 'JSON-FALLBACK') {
    eqState = 'EQ:JSON-FALLBACK';
  } else {
    eqState = 'EQ:STALE';
  }

  document.getElementById('u').innerHTML = '<span style="color:#666">[' + ts + '] [' + artState + '] [' + mediaSrc + '] [' + eqState + ']</span>';
}, 1000);
})();</script>
</body></html>
