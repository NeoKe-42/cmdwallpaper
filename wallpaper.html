<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:transparent;overflow:hidden;font-family:"Segoe UI","Microsoft YaHei","微软雅黑","Consolas","PingFang SC","Noto Sans SC","SimHei",monospace,sans-serif;font-size:15px}
body{display:flex;align-items:center;justify-content:center;color:#ccc}
.t{background:rgba(12,12,16,0.94);border:1px solid #2a2a2a;border-radius:10px;padding:24px 32px 20px 32px;min-width:980px;max-width:1200px;box-shadow:0 4px 40px rgba(0,0,0,0.7),inset 0 1px 0 rgba(255,255,255,0.03)}
/* Title bar */
.tb{color:#555;font-size:13px;margin-bottom:14px;display:flex;align-items:center;gap:10px;white-space:nowrap;padding-bottom:8px;border-bottom:1px solid #1e1e1e}
.tb .dot-r{color:#ff5f56}.tb .dot-y{color:#ffbd2e}.tb .dot-g{color:#27c93f}
.tb .userhost{color:#00ff88}.tb .sep{color:#3a3a3a}
/* Side-by-side body */
.body{display:flex;gap:28px}
/* Left column */
.left{flex-shrink:0;width:180px;display:flex;flex-direction:column;align-items:center;gap:6px}
.art-box{width:180px;height:180px;border:1px solid #2a2a2a;border-radius:6px;overflow:hidden;background:rgba(0,0,0,0.3);display:flex;align-items:center;justify-content:center}
.art-box img{width:100%;height:100%;object-fit:cover;display:none}
.art-placeholder{color:#333;font-size:12px;text-align:center;line-height:1.6}
.art-label{color:#555;font-size:11px;text-transform:uppercase;letter-spacing:1px}
/* Right panel */
.right{flex:1;min-width:0;color:#ccc;line-height:1.8}
.right .k{color:#00ff88}.right .v{color:#ddd}.right .m{color:#888;font-size:13px}
.right .sep-line{color:#333;font-size:13px;margin:2px 0}
.right .np-none{color:#555;font-size:14px;font-style:italic}
.right .title{color:#fff;font-size:15px}
.right .artist{color:#00ccff;font-size:14px}
.right .album{color:#777;font-size:13px}
.right .time{color:#888;font-size:13px}
/* EQ bar colors */
.eq-b{color:#ff5555}.eq-m{color:#f1fa8c}.eq-t{color:#50fa7b}.eq-s{color:#222}
/* Footer */
#u{color:#444;font-size:11px;text-align:right;margin-top:8px;border-top:1px solid #1e1e1e;padding-top:6px}
</style></head><body>
<div class="t">
<div class="tb">
<span class="dot-r">●</span><span class="dot-y">●</span><span class="dot-g">●</span>
<span class="userhost" id="tu">m1586@wangke</span>:~/
<span id="td">00:00:00</span><span class="sep">|</span><span id="tb"></span><span id="tp">0%</span><span class="sep">|</span><span id="dt">----</span>
</div>
<div class="body">
<div class="left">
<div class="art-box"><img id="art" style="display:none"><div class="art-placeholder" id="artph"><span style="font-size:32px;color:#444">♪</span><br>no album<br>art</div></div>
<div class="art-label" id="artlabel"></div>
</div>
<div class="right" id="right"></div>
</div>
<div id="u"></div>
</div>
<script>
(function(){
var R=500,S={npTitle:null,npStart:0,npDur:0,vol:50,sm:{b:0,m:0,t:0}};

// Clock
(function tck(){
  var n=new Date(),h=n.getHours(),m=n.getMinutes(),s=n.getSeconds();
  document.getElementById('td').textContent=String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
  document.getElementById('dt').textContent=n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0')+'-'+String(n.getDate()).padStart(2,'0')+' '+['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][n.getDay()];
  var pct=(h*3600+m*60+s)/86400*100,w=20,f=Math.round(pct/100*w),c=pct>80?'#ff5555':pct>60?'#f1fa8c':'#50fa7b';
  document.getElementById('tb').innerHTML='<span style="color:'+c+'">'+'█'.repeat(f)+'</span><span style="color:#333">'+'█'.repeat(w-f)+'</span>';
  document.getElementById('tp').textContent=pct.toFixed(1)+'%';
  setTimeout(tck,1000);
})();

// EQ bars animation (throttled to ~10fps)
var _lastEQ='';
(function anm(){
  var last=arguments.callee._t||0, now=Date.now();
  if(now-last<100){requestAnimationFrame(anm);return}
  arguments.callee._t=now;
  var sm=S.sm;
  var b=S.eqB||0,m=S.eqM||0,t=S.eqT||0;
  sm.b+=(b-sm.b)*0.4;sm.m+=(m-sm.m)*0.4;sm.t+=(t-sm.t)*0.4;
  var bf=Math.round(sm.b/5),mf=Math.round(sm.m/5),tf=Math.round(sm.t/5);
  var html='<span class="eq-b">'+'█'.repeat(bf)+'</span><span class="eq-s">'+'█'.repeat(20-bf)+'</span> BASS  '+
    '<span class="eq-m">'+'█'.repeat(mf)+'</span><span class="eq-s">'+'█'.repeat(20-mf)+'</span> MID  '+
    '<span class="eq-t">'+'█'.repeat(tf)+'</span><span class="eq-s">'+'█'.repeat(20-tf)+'</span> TREB';
  if(html!==_lastEQ){
    _lastEQ=html;
    var eqEl=document.getElementById('eqbars');
    if(eqEl)eqEl.innerHTML=html;
  }
  requestAnimationFrame(anm);
})();

// EQ sources
var _weHasAudio=false,_weLastAudio=0;
if(typeof window.wallpaperRegisterAudioListener==='function'){
  try{window.wallpaperRegisterAudioListener(function(L){if(!L||!L.length)return;var n=L.length,ba=0,ma=0,ta=0,bc=0,mc=0,tc=0;for(var i=0;i<n;i++){if(i<Math.floor(n*0.08)){ba+=L[i];bc++}else if(i<Math.floor(n*0.35)){ma+=L[i];mc++}else{ta+=L[i];tc++}}S.eqB=Math.min(100,(ba/bc)*100);S.eqM=Math.min(100,(ma/mc)*100);S.eqT=Math.min(100,(ta/tc)*100);_weHasAudio=true;_weLastAudio=Date.now()})}catch(e){}
}
setInterval(function(){
  if(_weHasAudio&&Date.now()-_weLastAudio<3000)return;
  if(Date.now()-_weLastAudio>=3000)_weHasAudio=false;
  var x=new XMLHttpRequest();x.open('GET','eq_data.json',true);x.timeout=200;
  x.onload=function(){try{var d=JSON.parse(x.responseText);S.eqB=d.b||0;S.eqM=d.m||0;S.eqT=d.t||0}catch(e){}}
  x.send()
},100);

// Helpers
function e(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function fm(g){return g>=1000?(g/1024).toFixed(1)+' TB':g.toFixed(1)+' GiB'}
function br(p,w){w=w||18;var f=Math.round(p/100*w),c=p>80?'#ff5555':p>60?'#f1fa8c':'#50fa7b';return'<span style="color:'+c+'">'+'█'.repeat(f)+'</span><span style="color:#333">'+'█'.repeat(w-f)+'</span>'}
function ft(s){s=isNaN(s)?0:Math.max(0,Math.round(s));return Math.floor(s/60)+':'+String(s%60).padStart(2,'0')}

function load(){
  var x=new XMLHttpRequest();x.open('GET','system_info.json',true);x.overrideMimeType('application/json; charset=utf-8');x.timeout=3000;
  x.onload=function(){
    if(x.status!==200&&x.status!==0)return;
    try{var t=x.responseText;if(t.charCodeAt(0)===0xFEFF)t=t.slice(1);var d=JSON.parse(t);
      var s=d.system,o=d.os,c=d.cpu,g=d.gpu,m=d.memory,dk=d.disk,nw=d.network,mb=d.motherboard;
      var lines=[];

      if(s)lines.push('<span class="k">user </span><span class="v">'+e(s.username||'?')+'</span><span class="m">@</span><span class="v">'+e(s.hostname||'?')+'</span>');
      lines.push('<div class="sep-line">'+'─'.repeat(42)+'</div>');
      if(o)lines.push('<span class="k">os  </span><span class="v">'+e(o.name||'?')+'</span> <span class="m">'+e(o.version||'')+' ('+e(o.architecture||'')+')</span>');
      if(c)lines.push('<span class="k">cpu </span><span class="v">'+e(c.name||'?')+'</span> <span class="m">'+(c.cores||0)+'C/'+(c.threads||0)+'T @ '+(c.frequency_mhz||0)+'MHz</span>');
      if(g&&g.length){var gl=g.filter(function(x){return x.indexOf('OrayIdd')===-1});if(!gl.length)gl=g;lines.push('<span class="k">gpu </span><span class="v">'+e(gl[0])+'</span>')}
      if(m)lines.push('<span class="k">ram </span><span class="v">'+fm(m.used_gb||0)+'</span><span class="m"> / '+fm(m.total_gb||0)+' ('+(m.percent||0).toFixed(0)+'%)</span> <span class="v">'+br(m.percent||0,18)+'</span>');
      lines.push('<div class="sep-line">'+'─'.repeat(42)+'</div>');
      if(dk)Object.keys(dk).forEach(function(l){var dd=dk[l];lines.push('<span class="k">disk</span><span class="v"> '+e(l.replace(':',''))+'</span> <span class="m">'+fm(dd.used_gb||0)+' / '+fm(dd.total_gb||0)+' ('+(dd.percent||0).toFixed(0)+'%)</span> <span class="v">'+br(dd.percent||0,18)+'</span>')});
      if(nw&&nw.ipv4)lines.push('<span class="k">net </span><span class="v">'+e(nw.ipv4)+'</span><span class="m"> ('+e(nw.interface||'')+')</span>');
      if(mb)lines.push('<span class="k">mb  </span><span class="m">'+e(mb)+'</span>');
      lines.push('<br>');

      // Now playing
      var np=d.now_playing||{};
      if(np.status==='playing'&&np.title&&np.artist){
        var title=np.title||'',artist=np.artist||'',album=np.album_title||'';
        if(title.length>120||artist.length>120||title.indexOf('http')>=0){
          S.npTitle=null;S._artRetries=0;S._artLoaded=false;
          document.getElementById('art').style.display='none';document.getElementById('artph').style.display='';
          lines.push('<span class="k">np  </span><span class="np-none">No media</span>');
        }else{
          var sp=np.position_seconds, sd=np.duration_seconds;
          if(S.npTitle!==title){S.npTitle=title;S._artRetries=6;S._artLoaded=false;document.getElementById('art').style.display='none';document.getElementById('artph').style.display=''}
          if(sp>=1){S.npStart=Date.now()-sp*1000;S.npDur=sd||0}

          var prog='';
          if(sp>=1&&sd>0){
            var f=Math.round(sp/sd*18);if(f>18)f=18;
            prog='<span class="time">'+ft(sp)+'</span> <span style="color:#50fa7b">'+'█'.repeat(f)+'</span><span style="color:#222">'+'█'.repeat(18-f)+'</span><span class="time"> '+ft(sd)+'</span>';
          }else if(sp>=1){prog='<span class="time">'+ft(sp)+'</span>'}
          lines.push('<span class="k">np  </span>'+prog);

          var npInfo='<span class="title">'+e(title)+'</span>  <span class="artist">'+e(artist)+'</span>';
          if(album)npInfo+=' <span class="album">['+e(album)+']</span>';
          lines.push('<span style="margin-left:55px">'+npInfo+'</span>');

          // Album art
          var art=document.getElementById('art');
          if(!S._artLoaded&&S._artRetries>0&&sp>=1){
            S._artRetries--;
            var ts=encodeURIComponent(title);
            art.onload=function(){this.style.display='block';document.getElementById('artph').style.display='none';S._artLoaded=true};
            art.onerror=function(){if(this.src.indexOf('.png')!==-1)this.src='album_art.jpg?cb='+ts};
            art.src='album_art.png?cb='+ts;
          }
        }
      }else{
        S.npTitle=null;S._artRetries=0;S._artLoaded=false;
        document.getElementById('art').style.display='none';
        document.getElementById('artph').style.display='';
        lines.push('<span class="k">np  </span><span class="np-none">No media</span>');
      }
      lines.push('<br>');

      // EQ
      lines.push('<span class="k">eq  </span><span id="eqbars"></span>');

      // Render right panel
      var html='<div>'+lines.join('</div><div>')+'</div>';
      if(S._lastRight!==html){S._lastRight=html;document.getElementById('right').innerHTML=html}

      // Update time
      var n=new Date();
      document.getElementById('u').textContent='updated '+String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0')+':'+String(n.getSeconds()).padStart(2,'0');
    }catch(e){}
  };
  x.send();
}
load();setInterval(load,R);
// Position ticker
setInterval(function(){if(!S.npTitle)return;var p=document.querySelector('#right .time');if(p)p.textContent=ft((Date.now()-S.npStart)/1000)},500);
})();</script>
</body></html>
