<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:transparent;font-family:"Consolas","Courier New","SimHei",monospace;font-size:18px;overflow:hidden;display:flex;align-items:center;justify-content:center}
.t{background:rgba(12,12,16,0.92);border:1px solid #333;border-radius:8px;padding:36px 48px;min-width:960px;max-width:1150px;box-shadow:0 4px 30px rgba(0,0,0,0.6)}
.tb{color:#666;font-size:15px;margin-bottom:18px;letter-spacing:1px;display:flex;gap:14px;white-space:nowrap}
.tb .g{color:#0f0}.r{color:#ff5555!important}.y{color:#f1fa8c!important}.b{color:#50fa7b!important}
.row{display:flex;line-height:2.0}.l{color:#00ff88;min-width:70px;flex-shrink:0}.c{color:#888;margin-right:10px}.v{color:#ddd}.d{color:#888;font-size:16px}.s{color:#444}
.np{color:#555;font-size:14px;font-style:italic}.np2{display:none}.na{color:#00ccff;font-size:15px}.nt{color:#ddd;font-size:16px}.nal{color:#777;font-size:13px}.nx{color:#888;font-size:14px}
#u{color:#555;font-size:13px;margin-top:14px;text-align:right}
</style></head><body>
<div class="t">
<div class="tb"><span class="r">●</span><span class="y">●</span><span class="b">●</span> <span class="g" id="tu">m1586@wangke</span>:~/ <span id="td">00:00:00</span><span class="s">|</span><span id="tb"></span><span id="tp">0%</span><span class="s">|</span><span id="dt">----</span></div>
<div class="row"><div class="l">sys</div><div class="c">~</div><div class="v" id="info"></div></div>
<div class="row"><div class="l">np</div><div class="c">~</div><div class="v" id="np"></div></div>
<div class="row"><div class="l">eq</div><div class="c">~</div><div class="v" id="eq"></div></div>
<div id="u"></div>
</div>
<script>
(function(){
var R=500,S={npTitle:null,npStart:0,npDur:0,vol:50,sm:{b:0,m:0,t:0}};

// Clock
(function tck(){
  var n=new Date(),h=n.getHours(),m=n.getMinutes(),s=n.getSeconds();
  document.getElementById('td').textContent=String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
  document.getElementById('dt').textContent=n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0')+'-'+String(n.getDate()).padStart(2,'0')+' '+['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][n.getDay()];
  var pct=(h*3600+m*60+s)/86400*100,w=20,f=Math.round(pct/100*w),c=pct>80?'#ff5555':pct>60?'#f1fa8c':'#50fa7b';
  document.getElementById('tb').innerHTML='<span style="color:'+c+'">'+'█'.repeat(f)+'</span><span style="color:#444">'+'█'.repeat(w-f)+'</span>';
  document.getElementById('tp').textContent=pct.toFixed(1)+'%';
  setTimeout(tck,1000);
})();

// EQ bars - use Wallpaper Engine audio if available, otherwise flat
(function anm(){
  var be=document.getElementById('eq'),sm=S.sm;
  var b=S.eqB||0,m=S.eqM||0,t=S.eqT||0;
  // When silent, bars drop to 0 (no fake sine waves)
  sm.b+=(b-sm.b)*0.4;sm.m+=(m-sm.m)*0.4;sm.t+=(t-sm.t)*0.4;
  var bf=Math.round(sm.b/5),mf=Math.round(sm.m/5),tf=Math.round(sm.t/5);
  be.innerHTML='<span style="color:#ff5555">'+'█'.repeat(bf)+'</span><span style="color:#444">'+'█'.repeat(20-bf)+'</span> BASS '+
    '<span style="color:#f1fa8c">'+'█'.repeat(mf)+'</span><span style="color:#444">'+'█'.repeat(20-mf)+'</span> MID '+
    '<span style="color:#50fa7b">'+'█'.repeat(tf)+'</span><span style="color:#444">'+'█'.repeat(20-tf)+'</span> TREB';
  requestAnimationFrame(anm);
})();

// EQ: prefer Wallpaper Engine native listener, fall back to DLL meter
var _weHasAudio=false,_weLastAudio=0;
if(typeof window.wallpaperRegisterAudioListener==='function'){
  try{window.wallpaperRegisterAudioListener(function(L){if(!L||!L.length)return;var n=L.length,ba=0,ma=0,ta=0,bc=0,mc=0,tc=0;for(var i=0;i<n;i++){if(i<Math.floor(n*0.08)){ba+=L[i];bc++}else if(i<Math.floor(n*0.35)){ma+=L[i];mc++}else{ta+=L[i];tc++}}S.eqB=Math.min(100,(ba/bc)*100);S.eqM=Math.min(100,(ma/mc)*100);S.eqT=Math.min(100,(ta/tc)*100);_weHasAudio=true;_weLastAudio=Date.now()})}catch(e){}
}
// Fast poll eq_data.json from DLL audio meter (every 100ms) — fallback if WE listener has no data
setInterval(function(){
  if(_weHasAudio&&Date.now()-_weLastAudio<3000)return;
  if(Date.now()-_weLastAudio>=3000)_weHasAudio=false;
  var x=new XMLHttpRequest();x.open('GET','eq_data.json',true);x.timeout=200;
  x.onload=function(){try{var d=JSON.parse(x.responseText);S.eqB=d.b||0;S.eqM=d.m||0;S.eqT=d.t||0}catch(e){}}
  x.send()
},100);

// Helpers
function e(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function fm(g){return g>=1000?(g/1024).toFixed(1)+' TB':g.toFixed(1)+' GiB'}
function br(p,w){w=w||25;var f=Math.round(p/100*w),c=p>80?'#ff5555':p>60?'#f1fa8c':'#50fa7b';return'<span style="color:'+c+'">'+'█'.repeat(f)+'</span><span style="color:#444">'+'█'.repeat(w-f)+'</span>'}
function ft(s){s=isNaN(s)?0:Math.max(0,Math.round(s));return Math.floor(s/60)+':'+String(s%60).padStart(2,'0')}

function load(){
  var x=new XMLHttpRequest();x.open('GET','system_info.json',true);x.overrideMimeType('application/json; charset=utf-8');x.timeout=3000;
  x.onload=function(){
    if(x.status!==200&&x.status!==0)return;
    try{var t=x.responseText;if(t.charCodeAt(0)===0xFEFF)t=t.slice(1);var d=JSON.parse(t);
      // System info
      var r=[],s=d.system,o=d.os,c=d.cpu,g=d.gpu,m=d.memory,dk=d.disk,nw=d.network,mb=d.motherboard;
      if(s)r.push('user '+e(s.username||'?')+'  host '+e(s.hostname||'?'));
      r.push('<span class="s">'+'─'.repeat(48)+'</span>');
      if(o)r.push('os '+e(o.name||'?')+' <span class="d">'+e(o.version||'')+' ('+e(o.architecture||'')+')</span>');
      if(c)r.push('cpu '+e(c.name||'?')+' <span class="d">'+(c.cores||0)+'C/'+(c.threads||0)+'T @ '+(c.frequency_mhz||0)+'MHz</span>');
      if(g&&g.length){var gl=g.filter(function(x){return x.indexOf('OrayIdd')===-1});if(!gl.length)gl=g;r.push('gpu '+e(gl[0]))}
      if(m)r.push('ram '+fm(m.used_gb||0)+' / '+fm(m.total_gb||0)+' ('+(m.percent||0).toFixed(0)+'%) '+br(m.percent||0,22));
      r.push('<span class="s">'+'─'.repeat(48)+'</span>');
      if(dk)Object.keys(dk).forEach(function(l){var dd=dk[l];r.push('disk '+e(l.replace(':',''))+' '+fm(dd.used_gb||0)+' / '+fm(dd.total_gb||0)+' ('+(dd.percent||0).toFixed(0)+'%) '+br(dd.percent||0,22))});
      if(nw&&nw.ipv4)r.push('<span class="d">ip '+e(nw.ipv4)+' ('+e(nw.interface||'')+')</span>');
      if(mb)r.push('<span class="d">mb '+e(mb)+'</span>');
      // Only update info if content changed (prevents flicker)
      var infoStr = r.join('<br>');
      if(S._lastInfo!==infoStr){S._lastInfo=infoStr;document.getElementById('info').innerHTML=infoStr}

      // Audio EQ from JSON (only if WE listener is not active)
      if(!_weHasAudio&&d.audio){S.eqB=d.audio.eq_bass||0;S.eqM=d.audio.eq_mid||0;S.eqT=d.audio.eq_treble||0;S.vol=d.audio.volume||50}

      // Now playing - SMTC provides real position/duration from DLL background thread
      var np=d.now_playing||{},npEl=document.getElementById('np');
      if(np.status==='playing'&&np.title&&np.artist){
        var title=np.title||'',artist=np.artist||'',album=np.album_title||'';
        if(title.length>120||artist.length>120||title.indexOf('http')>=0){S.npTitle=null;npEl.innerHTML='<span class=\"np\">No media</span>'}
        else{
          var sp=np.position_seconds, sd=np.duration_seconds;
          if(S.npTitle!==title){S.npTitle=title}
          if(sp>=1){S.npStart=Date.now()-sp*1000;S.npDur=sd||0}
          var timeStr='';
          if(sp>=1){timeStr='<span class=\"nx\">'+ft(sp)+'</span>'; if(sd>0){var f=Math.round(sp/sd*18);if(f>18)f=18;timeStr+=' <span style=\"color:#50fa7b\">'+'█'.repeat(f)+'</span><span style=\"color:#333\">'+'█'.repeat(18-f)+'</span> / '+ft(sd)}else{timeStr+=' '}}
          var ns=timeStr+'<span class=\"nt\">'+e(title)+'</span> <span class=\"na\">'+e(artist)+'</span>'+(album?' <span class=\"nal\">['+e(album)+']</span>':'');
          if(S._ln!==ns){S._ln=ns;npEl.innerHTML=ns}
        }
      }else{
        S.npTitle=null;S._ln='';npEl.innerHTML='<span class=\"np\">No media</span>';
      }

      // Update time
      var n=new Date();
      document.getElementById('u').textContent='updated '+String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0')+':'+String(n.getSeconds()).padStart(2,'0');
    }catch(e){}
  };
  x.send();
}
load();setInterval(load,R);
// Tick position every 500ms independent of JSON poll
setInterval(function(){if(!S.npTitle)return;var p=document.querySelector('#np .nx');if(p)p.textContent=ft((Date.now()-S.npStart)/1000)},500);
})();</script>
</body></html>
